<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EliteV8</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Theme Color -->
  <meta name="theme-color" content="#000000">

  <!-- Basic Style -->
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
      text-align: center;
    }
    header {
      padding: 20px;
      font-size: 24px;
      font-weight: bold;
      background: #111;
    }
    .container {
      padding: 20px;
    }
    video {
      width: 100%;
      max-width: 500px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <header>EliteV8 🚀</header>

  <div class="container">
    <h2>Welcome to EliteV8</h2>
    <p>Your video platform is ready!</p>

    <!-- Sample Video -->
    <video controls>
      <source src="sample.mp4" type="video/mp4">
      Your browser does not support video.
    </video>
  </div>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js')
        .then(function() {
          console.log("Service Worker Registered");
        })
        .catch(function(error) {
          console.log("Service Worker Failed:", error);
        });
    }
  </script>

</body>
</html>
